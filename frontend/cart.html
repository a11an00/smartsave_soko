<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CART</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <nav class="navbar">

        <div class="logo">
            <h3>SmartSave Soko</h3>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="help.html">Help</a></li>
        </ul>
        </ul>

    </nav>
<div class="cart-container">

    <h1><u>My Cart</u></h1>

    <div class="cart-item">

        <img src="images/cart2.jpg.jpg" alt="Product">

        <div class="cart-details">

            <h3>Red Wine</h3>

            <p>Ksh 3,000</p>

            <label>Quantity</label>
            <input type="number" value="1" min="1">

        </div>

        <button class="remove-btn">Remove</button>

    </div>

    <div class="cart-item">

        <img src="images/cart.jpg.jpg" alt="Product">

        <div class="cart-details">

            <h3>Leather Shoes</h3>

            <p>Ksh 4,200</p>

            <label>Quantity</label>
            <input type="number" value="1" min="1">

        </div>

        <button class="remove-btn">Remove</button>

    </div>

    <div class="cart-summary">

        <h2>Total: Ksh 7,200</h2>

        <button class="checkout-btn">

            Proceed to Checkout

        </button>

    </div>

</div>
<p class="signature">
    🍃 S<sup>3</sup> • SmartSave Soko
</p>
</body>
</html>
