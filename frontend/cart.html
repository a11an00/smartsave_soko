<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart | SmartSave Soko</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="cart.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo"><h3>SmartSave Soko</h3></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="help.html">Help</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </nav>

    <section class="cart-section">
      <h2>Your Cart</h2>
      <div id="cart-items">
        <p>Loading cart...</p>
      </div>

      <div class="cart-summary" id="cart-summary" style="display: none">
        <div class="threshold-wrapper">
          <label for="threshold-input">
            Only recommend splitting stores if it saves at least (KES):
          </label>
          <input type="number" id="threshold-input" value="150" min="0" />
        </div>

        <button id="compare-btn" class="checkout-btn">
          <img
            src="images/compare.jpg"
            alt="Compare Icon"
            class="compare-img"
          />
          Compare Prices
        </button>
      </div>
    </section>

    <section
      class="comparison-section"
      id="comparison-section"
      style="display: none"
    >
      <h2>Price Comparison</h2>
      <div id="comparison-results"></div>
    </section>

    <p class="signature">🍃 S<sup>3</sup> • SmartSave_Soko</p>

    <script src="cart.js"></script>
  </body>
</html>
