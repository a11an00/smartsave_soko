<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SmartSave Soko</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-user-plus login-icon"></i>
            <h1>Create Your Account</h1>
            <p>Start saving on your shopping today.</p>
        </div>
        <form id="signup-form">
            <div class="login-input">
                <i class="fa-solid fa-envelope"></i>
                <input type="email"
                placeholder="Email Address" id="signup-email" required>
            </div>
            <div class="login-input">
                <i class="fa-solid fa-lock"></i>
                <input type="password"
                placeholder="Password (min. 6 characters)" id="signup-password" required minlength="6">
            </div>
            <div class="login-input">
                <i class="fa-solid fa-lock"></i>
                <input type="password"
                placeholder="Confirm Password" id="signup-confirm-password" required minlength="6">
            </div>
            <button class="login-btn" type="submit">
                Sign Up
            </button>
        </form>
        <div class="login-footer">
            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </div>
</div>
<p class="signature">
    🍃 S<sup>3</sup> • SmartSave_Soko
</p>
<script src="signup.js"></script>
</body>
</html>
