<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>

<body>

<div class="profile-container">

    <div class="profile-info">

        <img src="images/Profile.jpg.jpg" alt="Profile" class="profile-img">

        <h2>SmartSave Soko Account</h2>
            <hr>

        <p class="username">Welcome back XX!</p>

        <div class="stats">

            <div>
                <h4>3 Pending Orders</h4>
            </div>

            <div>
                <h4>14 Reviews</h4>
            </div>

        </div>

        <div class="info">
             <h4><u>Profile Details</u></h4>
             <p class="email">gmail@example.com</p>
             <p><Phone Number +254 700 123 456</p>
            <p> Location Nairobi, Kenya</p>

            <p>Member Since July 2026</p>

        </div>

        <div class="buttons">

            <button>Edit Profile</button>
           
            <button>My Orders</button>
           
            <button>Wishlist</button>
         
            <button>Settings</button>
        
            <button class="logout">Logout</button>

        </div>
        <p class="signature">
            🍃 S<sup>3</sup> • SmartSave_Soko
        </p>
        

    </div>

</div>

<script src="profile.js"></script>

</body>
</html>
