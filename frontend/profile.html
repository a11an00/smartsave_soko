<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>

<body>

<div class="profile-container">

    <div class="profile-info">

        <img src="images/Profile.jpg.jpg" alt="Profile" class="profile-img">

        <h2>SmartSave Soko Account</h2>
        <hr>

        <p class="username" id="profile-welcome">Loading...</p>

        <div class="info">
             <h4><u>Profile Details</u></h4>
             <p class="email" id="profile-email">Loading...</p>
             <p id="profile-member-since">Loading...</p>
        </div>

        <div class="buttons">
            <button disabled title="Coming soon">Edit Profile</button>
            <button disabled title="Coming soon">My Orders</button>
            <button disabled title="Coming soon">Wishlist</button>
            <button disabled title="Coming soon">Settings</button>
            <button class="logout">Logout</button>
        </div>
        <p class="signature">
            🍃 S<sup>3</sup> • SmartSave_Soko
        </p>

    </div>

</div>

<script src="profile.js"></script>

</body>
</html>
